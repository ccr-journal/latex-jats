services:
  caddy:
    image: ccsamsterdam/latex-jats-caddy:${VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-localhost}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

  api:
    image: ccsamsterdam/latex-jats-api:${VERSION:-latest}
    restart: unless-stopped
    env_file:
      - .env  # EDITOR_CREDENTIALS, OJS_*, SITE_ADDRESS, etc. — see .env.example
    environment:
      - CORS_ORIGINS=
      - STORAGE_DIR=/app/storage
    volumes:
      - app_storage:/app/storage

volumes:
  caddy_data:
  caddy_config:
  app_storage:
