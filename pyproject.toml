[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "latex-jats"
version = "0.1.0"
description = "Convert CCR journal LaTeX manuscripts to JATS XML"
requires-python = ">=3.10"

[tool.setuptools.packages.find]
where = ["src"]

[project.scripts]
latex-jats = "latex_jats.convert:main"
fixbib = "latex_jats.fixbib:main"
