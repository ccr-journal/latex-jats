name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend/caddy image
        uses: docker/build-push-action@v6
        with:
          context: web/frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/latex-jats-caddy:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/latex-jats-caddy:latest

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/latex-jats-api:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/latex-jats-api:latest

      - name: Package deploy files
        run: |
          mkdir latex-jats-deploy
          cp deploy/docker-compose.yml latex-jats-deploy/
          cp deploy/.env.example latex-jats-deploy/.env
          zip -r latex-jats-deploy.zip latex-jats-deploy

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: latex-jats-deploy.zip
          generate_release_notes: true
