services:
  caddy:
    build:
      context: web/frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"  # only used when SITE_ADDRESS is a domain
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-localhost}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: web/backend/Dockerfile
    restart: unless-stopped
    environment:
      - CORS_ORIGINS=
      - STORAGE_DIR=/app/storage
    volumes:
      - app_storage:/app/storage

volumes:
  caddy_data:
  caddy_config:
  app_storage:
